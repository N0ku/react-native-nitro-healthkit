name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm provenance
    defaults:
      run:
        working-directory: packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: packages/package-lock.json

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 24 ships an older 11.x.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # No NODE_AUTH_TOKEN: auth + provenance come from GitHub's OIDC token
      # (permissions.id-token: write above) via the npm trusted publisher.
      - name: Publish
        run: npm publish --access public
